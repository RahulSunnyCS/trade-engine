name: CI

on:
  push:
    branches:
      - main
      - "claude/**"
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # --------------------------------------------------------
  # Job 1: Type-check + Lint
  # Fast gate — runs without services, catches most mistakes
  # --------------------------------------------------------
  typecheck-and-lint:
    name: Type Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run build

      - name: Lint
        run: npm run lint

  # --------------------------------------------------------
  # Job 2: Tests
  # Spins up TimescaleDB + Redis via service containers
  # --------------------------------------------------------
  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: typecheck-and-lint

    services:
      timescaledb:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: trade_engine_test
          POSTGRES_USER: trade_engine
          POSTGRES_PASSWORD: ci_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U trade_engine -d trade_engine_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npm run db:migrate
        env:
          DATABASE_URL: postgresql://trade_engine:ci_test_password@localhost:5432/trade_engine_test

      - name: Run tests
        run: npm run test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://trade_engine:ci_test_password@localhost:5432/trade_engine_test
          REDIS_URL: redis://localhost:6379
          FYERS_PAPER_TRADING: "true"
          DATA_PROVIDER: mock
          # Fyers credentials are NOT set in CI — tests use mock/stub clients

  # --------------------------------------------------------
  # Job 3: Build Check
  # Ensures the project compiles cleanly to dist/
  # --------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
